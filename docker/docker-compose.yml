name: alpha-architecture-prototype

services:
  kafka:
    image: apache/kafka:4.0.1
    container_name: aap-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT_HOST://0.0.0.0:9092,PLAINTEXT://0.0.0.0:19092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_HOST://localhost:9092,PLAINTEXT://kafka:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - ./volumes/kafka:/var/lib/kafka/data

  crypto-producer:
    build: ../crypto_producer
    container_name: aap-crypto-producer
    env_file:
      - ./.env
    depends_on:
      - kafka
    volumes:
      - ../:/workspace
    environment:
      PYTHONPATH: /workspace
    restart: on-failure

  spark-master:
    build:
      context: ./spark
    container_name: aap-spark-master
    env_file:
      - ./.env
    environment:
      - SPARK_MODE=master
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master" ]
    mem_limit: 1g  
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./volumes/spark:/opt/spark/work-dir
      - ./volumes/data:/data

  spark-worker:
    build:
      context: ./spark
    environment:
      - SPARK_WORKER_MEMORY=5g          
      - SPARK_WORKER_CORES=6 
    mem_limit: 6g 
    container_name: aap-spark-worker
    env_file:
      - ./.env
    depends_on:
      - spark-master
    command: [ "/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077" ]
    ports:
      - "8081:8081"
    volumes:
      - ./volumes/spark:/opt/spark/work-dir
      - ./volumes/data:/data

  spark-client:
    build:
      context: ./spark
    container_name: aap-spark-client
    env_file:
      - ./.env
    depends_on:
      - spark-master
      - kafka
    command: [ "sleep", "infinity" ]
    mem_limit: 2g 
    volumes:
      - ../:/workspace
      - ./volumes/data:/data
    environment:
      - PYTHONPATH=/workspace

  data-init:
    image: busybox
    container_name: aap-data-init
    command: >
      sh -c "mkdir -p
        /data/bronze/delta /data/bronze/checkpoints
        /data/silver/delta /data/silver/checkpoints
        /data/gold/delta   /data/gold/checkpoints
        /data/batch &&
        chmod -R 777 /data"
    volumes:
      - ./volumes/data:/data

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aap-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8085:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092


